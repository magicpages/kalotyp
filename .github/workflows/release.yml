name: Release

# Changesets release flow:
#   1. PRs land on main with a changeset (see CONTRIBUTING.md).
#   2. This workflow opens/updates a "Version Packages" PR that bumps the
#      three linked packages and assembles the changelog.
#   3. Merging that PR runs `pnpm release`, which builds and publishes the
#      packages to npm. Publishing to npm is what makes the jsDelivr / unpkg
#      CDN URLs live — no separate CDN step is needed.
#
# Auth: npm Trusted Publishing (OIDC). No NPM_TOKEN secret is stored; the
# `id-token: write` permission lets the runner mint a short-lived token, and
# `publishConfig.provenance` in each package stamps a verifiable link from the
# published artifact back to this workflow + commit. The trusted publisher must
# be configured once on npmjs.com for each package (Settings → Trusted Publisher
# → GitHub Actions → magicpages/kalotyp, workflow `release.yml`).

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version PR / publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the Version PR, tags, and GitHub Release
      pull-requests: write # open/update the Version PR
      id-token: write # OIDC for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # Trusted Publishing needs a recent npm. Node 22 ships one new enough,
      # but pin-bump defensively so provenance + OIDC are always available.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Build
        run: pnpm build

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
