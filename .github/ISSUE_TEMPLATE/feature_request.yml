name: Feature request
description: Suggest an improvement to the editor.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the feature. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional — how you imagine it working.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits an image editor for Ghost (not a general-purpose editor feature).
