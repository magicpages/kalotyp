<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalotyp playground</title>
    <link rel="stylesheet" href="/kalotyp.css" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbfbfc;
        --fg: #15171a;
        --muted: #6b7280;
        --border: #e4e6eb;
        --accent: #3b82f6;
        --card: #ffffff;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #15171a;
          --fg: #f4f5f6;
          --muted: #9aa1ac;
          --border: #2a2d33;
          --card: #1c1f24;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
        padding: 32px 20px 64px;
      }
      main { max-width: 880px; margin: 0 auto; }
      header h1 { margin: 0 0 4px; font-size: 22px; }
      header p { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
      header code { font-size: 12px; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .row + .row { margin-top: 12px; }
      label { font-size: 13px; color: var(--muted); display: inline-flex; gap: 6px; align-items: center; }

      input[type="url"] {
        flex: 1 1 320px;
        min-width: 0;
        font: inherit;
        font-size: 13px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
      }
      select {
        font: inherit;
        font-size: 13px;
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
      }

      button {
        font: inherit;
        font-size: 13px;
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        color: var(--fg);
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      button:hover { border-color: var(--accent); }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { filter: brightness(1.05); }
      button.sample { font-size: 12px; padding: 6px 10px; }

      .samples { gap: 6px; }

      pre.log {
        margin: 0;
        max-height: 280px;
        overflow: auto;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .log .ev-process { color: #16a34a; }
      .log .ev-error { color: #dc2626; }
      .log .ev-info { color: var(--muted); }

      .result { display: none; margin-top: 14px; }
      .result.show { display: block; }
      .result img {
        max-width: 100%;
        max-height: 320px;
        border: 1px solid var(--border);
        border-radius: 8px;
        display: block;
      }
      .result .meta { font-size: 12px; color: var(--muted); margin: 8px 0; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Kalotyp playground</h1>
        <p>
          Loads <code>/kalotyp.js</code> the way Ghost does — dynamic
          <code>import()</code>, then <code>window.pintura.openDefaultEditor()</code> — so you
          can drive the editor without a running Ghost.
        </p>
      </header>

      <div class="card">
        <h2>Source image</h2>
        <div class="row samples" id="samples"></div>
        <div class="row">
          <label style="flex: 1 1 320px;">
            URL
            <input
              id="src-url"
              type="url"
              value="https://images.unsplash.com/photo-1520503922584-590e8f7a90d7?w=2000&q=80"
            />
          </label>
        </div>
        <div class="row">
          <label>File <input id="src-file" type="file" accept="image/*" /></label>
        </div>
      </div>

      <div class="card">
        <h2>Open</h2>
        <div class="row">
          <label>
            Initial tool
            <select id="util">
              <option value="">(default — crop)</option>
              <option value="crop">crop</option>
              <option value="rotate">rotate</option>
              <option value="flip">flip</option>
              <option value="filter">filter</option>
              <option value="finetune">finetune</option>
              <option value="annotate">annotate</option>
              <option value="redact">redact</option>
              <option value="resize">resize</option>
              <option value="frame">frame</option>
            </select>
          </label>
          <button class="primary" id="open" type="button">Open editor</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </div>

      <div class="card">
        <h2>Events</h2>
        <pre class="log" id="log"></pre>
        <div class="result" id="result">
          <div class="meta" id="result-meta"></div>
          <img id="result-img" alt="Saved output" />
          <div class="row" style="margin-top: 10px;">
            <a id="result-download" download><button type="button">Download output</button></a>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
